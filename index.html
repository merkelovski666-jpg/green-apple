
<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Apple Chat</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Green Apple">
    <link rel="apple-touch-icon" sizes="180x180" href="https://img.icons8.com/color/180/000000/apple.png">
    <link rel="manifest" href="/manifest.json">

    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        .header { background: #075e54; color: white; padding: 15px; font-weight: bold; text-align: center; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .call-btn { background: #128c7e; border: none; color: white; padding: 5px 10px; border-radius: 5px; float: right; cursor: pointer; font-size: 14px; }
        
        /* Zarada */
        .ad-space { background: #fff; text-align: center; font-size: 11px; color: #888; border-bottom: 1px solid #ccc; padding: 5px; min-height: 50px; }
        
        /* Poruke */
        #messages { flex: 1; overflow-y: auto; list-style-type: none; padding: 15px; margin: 0; display: flex; flex-direction: column; }
        #messages li { padding: 8px 12px; margin-bottom: 8px; border-radius: 10px; max-width: 80%; word-wrap: break-word; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); align-self: flex-start; position: relative; }
        .user-name { font-size: 10px; font-weight: bold; color: #075e54; display: block; margin-bottom: 3px; }
        
        /* Unos */
        form { display: flex; padding: 10px; background: #f0f0f0; border-top: 1px solid #ddd; }
        input { flex: 1; border: none; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; }
        button#send { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; cursor: pointer; font-size: 20px; }

        /* Video */
        #video-grid { display: none; background: #000; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { width: 30%; height: 30%; position: absolute; bottom: 80px; right: 20px; border: 2px solid #fff; border-radius: 8px; transform: scaleX(-1); }
        .end-call { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #ff3b30; color: white; border: none; border-radius: 50%; width: 65px; height: 65px; font-size: 30px; }
        
        #peer-info { font-size: 9px; color: #dcf8c6; display: block; margin-top: 2px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="video-grid">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <button class="end-call" onclick="endCall()">×</button>
    </div>

    <div class="header">
        Green Apple Chat
        <button class="call-btn" onclick="startCall()">📞 Poziv</button>
        <span id="peer-info" onclick="copyMyID()">Klikni da kopiraš svoj ID</span>
    </div>

    <div class="ad-space">
        <p>REKLAMA (Ovdje zarađuješ novac)</p>
    </div>
    
    <ul id="messages"></ul>

    <form id="form">
        <input id="input" autocomplete="off" placeholder="Napiši poruku..." />
        <button id="send">></button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <script>
        var socket = io();
        var myName = prompt("Dobrodošli u Green Apple! Unesite vaše ime:") || "Gost";
        var myID = "";

        // --- CHAT ---
        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            var input = document.getElementById('input');
            if (input.value) {
                // Šaljemo ime i poruku zajedno
                socket.emit('chat message', { name: myName, text: input.value });
                input.value = '';
            }
        });

        socket.on('chat message', function(data) {
            var item = document.createElement('li');
            item.innerHTML = `<span class="user-name">${data.name}</span>${data.text}`;
            document.getElementById('messages').appendChild(item);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        // --- VIDEO (PEERJS) ---
        var peer = new Peer(); 

        peer.on('open', id => {
            myID = id;
            document.getElementById('peer-info').innerText = "Tvoj ID (Klikni za kopiranje): " + id;
        });

        function copyMyID() {
            navigator.clipboard.writeText(myID);
            alert("ID kopiran! Pošalji ga prijatelju u chatu.");
        }

        peer.on('call', function(call) {
            if(confirm("Neko vas zove! Prihvatiti video poziv?")) {
                navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                    document.getElementById('video-grid').style.display = 'block';
                    document.getElementById('local-video').srcObject = stream;
                    call.answer(stream);
                    call.on('stream', remoteStream => {
                        document.getElementById('remote-video').srcObject = remoteStream;
                    });
                });
            }
        });

        function startCall() {
            var friendID = prompt("Zalijepi ID prijatelja ovdje:");
            if(friendID) {
                navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                    document.getElementById('video-grid').style.display = 'block';
                    document.getElementById('local-video').srcObject = stream;
                    var call = peer.call(friendID, stream);
                    call.on('stream', remoteStream => {
                        document.getElementById('remote-video').srcObject = remoteStream;
                    });
                });
            }
        }

        function endCall() { location.reload(); }
    </script>
</body>
</html>
