
<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple</title>
    <style>
        :root { --green: #32d74b; --dark: #000; --card: #1c1c1e; --blur: blur(25px); }
        body, html { margin: 0; padding: 0; background: var(--dark); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100%; overflow: hidden; }

        /* SPLASH SCREEN */
        #splash { position: fixed; inset: 0; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.5s; }
        .apple-logo { width: 100px; filter: drop-shadow(0 0 15px var(--green)); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

        /* REGISTRACIJA */
        #auth-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9000; display: none; flex-direction: column; align-items: center; padding: 40px 20px; }
        .profile-upload { width: 120px; height: 120px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid var(--green); margin-bottom: 20px; cursor: pointer; }
        .profile-upload img { width: 100%; height: 100%; object-fit: cover; }
        input.apple-in { width: 100%; background: var(--card); border: none; padding: 15px; border-radius: 12px; color: white; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-green { width: 100%; background: var(--green); color: black; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* MAIN APP */
        #main-app { height: 100vh; display: none; flex-direction: column; }
        .header { padding: 50px 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: var(--blur); border-bottom: 0.5px solid #333; sticky; top:0; }
        .header h1 { font-size: 34px; margin: 0; letter-spacing: -1px; color: var(--green); }
        
        .contact-list { flex: 1; overflow-y: auto; padding-top: 10px; }
        .user-item { display: flex; align-items: center; padding: 15px 20px; gap: 15px; border-bottom: 0.3px solid #222; }
        .user-item img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }
        .user-item .info b { font-size: 17px; }
        .user-item .info span { color: #8e8e93; font-size: 14px; display: block; }

        /* CHAT WINDOW */
        #chat-window { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; }
        .chat-header { padding: 15px; display: flex; align-items: center; gap: 15px; background: rgba(28,28,30,0.9); backdrop-filter: var(--blur); border-bottom: 0.5px solid #333; }
        #msg-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 6px; }
        .bubble { padding: 10px 16px; border-radius: 20px; max-width: 75%; font-size: 16px; position: relative; }
        .me { align-self: flex-end; background: var(--green); color: black; border-bottom-right-radius: 4px; }
        .them { align-self: flex-start; background: var(--card); color: white; border-bottom-left-radius: 4px; }
        .input-bar { padding: 10px 15px 35px; display: flex; align-items: center; gap: 10px; background: var(--dark); border-top: 0.5px solid #333; }
        .input-bar input { flex: 1; background: var(--card); border: none; padding: 12px 18px; border-radius: 22px; color: white; outline: none; }

        /* VIDEO CALL */
        #video-overlay { display: none; position: fixed; inset: 0; background: black; z-index: 10000; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { width: 100px; height: 150px; position: absolute; top: 40px; right: 20px; border-radius: 15px; border: 2px solid var(--green); object-fit: cover; }
        .hangup { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); background: #ff3b30; width: 75px; height: 75px; border-radius: 50%; border: none; color: white; font-size: 35px; }
    </style>
</head>
<body>

<div id="splash">
    <img class="apple-logo" src="https://img.icons8.com/color/512/apple-logo.png" alt="logo">
    <h2 style="margin-top: 20px;">Green Apple</h2>
</div>

<div id="auth-screen">
    <h1>Postavi Profil</h1>
    <div class="profile-upload" onclick="document.getElementById('file-in').click()">
        <img id="preview" src="https://img.icons8.com/fluency/96/user-male-circle.png">
    </div>
    <input type="file" id="file-in" hidden accept="image/*">
    <input id="reg-name" class="apple-in" placeholder="Ime i Prezime">
    <input id="reg-phone" class="apple-in" placeholder="Broj telefona (npr. 00387...)">
    <button class="btn-green" onclick="register()">UĐI U JABUKU</button>
</div>

<div id="video-overlay">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay muted playsinline></video>
    <button class="hangup" onclick="location.reload()">✕</button>
</div>

<div id="main-app">
    <div class="header">
        <h1>Poruke</h1>
        <div style="display: flex; gap: 15px;">
            <span onclick="toggleAdmin()" style="font-size: 24px;">🍏</span>
        </div>
    </div>
    <div id="contacts" class="contact-list"></div>
</div>

<div id="chat-window">
    <div class="chat-header">
        <span onclick="closeChat()" style="color: var(--green); cursor: pointer;">❮ Nazad</span>
        <img id="target-img" src="" style="width: 40px; height: 40px; border-radius: 50%;">
        <b id="target-name" style="flex: 1;">Ime</b>
        <span onclick="initiateCall()" style="font-size: 24px; cursor: pointer;">📞</span>
    </div>
    <div id="msg-container"></div>
    <form class="input-bar" id="msg-form">
        <input id="msg-input" placeholder="iMessage" autocomplete="off">
        <button type="submit" style="background: var(--green); border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold;">↑</button>
    </form>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
    const socket = io();
    let myData = JSON.parse(localStorage.getItem('apple_user'));
    let peer, activeTarget = null;

    // Splash Timer
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            if(!myData) document.getElementById('auth-screen').style.display = 'flex';
            else startApp();
        }, 500);
    }, 2500);

    // Profilna Slika Preview
    document.getElementById('file-in').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = () => document.getElementById('preview').src = reader.result;
        reader.readAsDataURL(e.target.files[0]);
    };

    function register() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const photo = document.getElementById('preview').src;
        if(name && phone) {
            myData = { name, phone, photo };
            localStorage.setItem('apple_user', JSON.stringify(myData));
            location.reload();
        }
    }

    function startApp() {
        document.getElementById('main-app').style.display = 'flex';
        socket.emit('auth', myData);
        
        // FIX ZA POZIVE: Koristimo stabilne Google STUN servere
        peer = new Peer(myData.phone, {
            config: { 'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]}
        });

        peer.on('call', handleIncomingCall);
    }

    socket.on('user_list', (users) => {
        const container = document.getElementById('contacts');
        container.innerHTML = "";
        users.forEach(u => {
            if(u.phone === myData.phone) return;
            const item = document.createElement('div');
            item.className = 'user-item';
            item.onclick = () => openChat(u);
            item.innerHTML = `<img src="${u.photo}"><div class="info"><b>${u.name}</b><span>Pritisni za chat</span></div>`;
            container.appendChild(item);
        });
    });

    function openChat(user) {
        activeTarget = user;
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('target-name').innerText = user.name;
        document.getElementById('target-img').src = user.photo;
        document.getElementById('msg-container').innerHTML = "";
    }

    function closeChat() { document.getElementById('chat-window').style.display = 'none'; activeTarget = null; }

    document.getElementById('msg-form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if(input.value && activeTarget) {
            socket.emit('send_msg', { from: myData.phone, to: activeTarget.phone, text: input.value });
            input.value = "";
        }
    };

    socket.on('new_msg', (data) => {
        if(activeTarget && (data.from === activeTarget.phone || data.from === myData.phone)) {
            const b = document.createElement('div');
            b.className = `bubble ${data.from === myData.phone ? 'me' : 'them'}`;
            b.innerText = data.text;
            document.getElementById('msg-container').appendChild(b);
            document.getElementById('msg-container').scrollTop = document.getElementById('msg-container').scrollHeight;
        }
    });

    // POZIVI LOGIKA (POPRAVLJENO)
    function initiateCall() {
        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
            document.getElementById('video-overlay').style.display = 'block';
            document.getElementById('local-video').srcObject = stream;
            const call = peer.call(activeTarget.phone, stream);
            call.on('stream', remoteStream => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        }).catch(err => alert("Kamera nije dostupna ili dozvoljena."));
    }

    function handleIncomingCall(call) {
        if(confirm("Dolazni Apple Video Poziv... Prihvati?")) {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                document.getElementById('video-overlay').style.display = 'block';
                document.getElementById('local-video').srcObject = stream;
                call.answer(stream);
                call.on('stream', remoteStream => {
                    document.getElementById('remote-video').srcObject = remoteStream;
                });
            });
        }
    }

    function toggleAdmin() {
        if(myData.phone === "00387603344334") {
            alert("Dobrodošli Preet. Nadzor sistema je aktivan.");
        } else {
            alert("Pristup dozvoljen samo Green Apple Support timu.");
        }
    }
</script>
</body>
</html>
