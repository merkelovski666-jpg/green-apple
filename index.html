<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple Pro</title>
    <style>
        :root { --apple-green: #30d158; --bg: #000; --card: #1c1c1e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 25px 20px; background: var(--card); border-bottom: 0.5px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .pulse { width: 12px; height: 12px; background: var(--apple-green); border-radius: 50%; box-shadow: 0 0 10px var(--apple-green); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 16px; }
        .sent { background: var(--apple-green); color: black; align-self: flex-end; border-bottom-right-radius: 4px; }
        .received { background: #2c2c2e; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area { padding: 15px; background: var(--card); display: flex; gap: 10px; padding-bottom: 30px; }
        input { flex: 1; padding: 15px; background: #2c2c2e; border: none; border-radius: 25px; color: white; outline: none; }
        button { background: var(--apple-green); border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1 id="brand">Green Apple Support</h1>
        <div class="pulse"></div>
    </header>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Napišite poruku...">
        <button onclick="send()">↑</button>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let session = JSON.parse(localStorage.getItem('ga_session_pro'));
        if(!session) {
            const name = prompt("Vaše Ime:");
            const phone = prompt("Vaš Broj Telefona (sa 00):");
            if(name && phone) {
                session = { name, phone };
                localStorage.setItem('ga_session_pro', JSON.stringify(session));
                location.reload();
            }
        }
        socket.emit('register', session);
        function send() {
            const inp = document.getElementById('msg-input');
            if(!inp.value) return;
            socket.emit('message', { text: inp.value });
            render(inp.value, 'sent');
            inp.value = '';
        }
        socket.on('msg-receive', (data) => {
            render(`<b>${data.from}:</b> ${data.text}`, 'received');
        });
        function render(text, type) {
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="bubble ${type}">${text}</div>`;
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
