
<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple 🔐</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0b141a; margin: 0; display: flex; flex-direction: column; height: 100vh; color: white; }
        .header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #313d45; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        li { padding: 10px; border-radius: 8px; max-width: 75%; background: #202c33; align-self: flex-start; list-style: none; }
        .my-msg { align-self: flex-end; background: #005c4b; }
        
        #video-wrap { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { width: 30%; height: 20%; position: absolute; top: 20px; right: 20px; border-radius: 10px; border: 2px solid #00a884; transform: scaleX(-1); }
        .controls { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: center; }
        .btn-call { background: #25d366; border: none; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .btn-hangup { background: #ff3b30; border: none; color: white; width: 65px; height: 65px; border-radius: 50%; font-size: 28px; cursor: pointer; }
        
        form { display: flex; padding: 10px; background: #202c33; }
        input { flex: 1; border: none; padding: 12px; border-radius: 20px; background: #2a3942; color: white; outline: none; }
        .settings-btn { background: none; border: 1px solid #555; color: #888; font-size: 10px; padding: 2px 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="video-wrap">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay muted playsinline></video>
    <div class="controls">
        <button class="btn-hangup" onclick="endCall()">❌</button>
    </div>
</div>

<div class="header">
    <div>
        <h1 style="font-size:18px; margin:0;">Green Apple 🔐</h1>
        <small id="info" style="color:#00a884"></small>
        <button class="settings-btn" onclick="resetApp()">Resetuj Profil</button>
    </div>
    <button class="btn-call" onclick="makeCall()">📞 POZOVI</button>
</div>

<ul id="messages"></ul>

<form id="chat-form">
    <input id="msg-input" placeholder="Napiši poruku..." autocomplete="off">
</form>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
    const socket = io();
    let myStream;
    let currentCall;

    // --- PAMĆENJE PODATAKA ---
    let myName = localStorage.getItem('apple_name');
    let myPhone = localStorage.getItem('apple_phone');
    let myRoom = localStorage.getItem('apple_room');

    if (!myName || !myPhone || !myRoom) {
        myName = prompt("Tvoje ime:");
        myPhone = prompt("Tvoj broj (npr. 123):");
        myRoom = prompt("Ime sobe (npr. tajna):");
        
        if(myName && myPhone && myRoom) {
            localStorage.setItem('apple_name', myName);
            localStorage.setItem('apple_phone', myPhone);
            localStorage.setItem('apple_room', myRoom);
        } else {
            location.reload();
        }
    }

    document.getElementById('info').innerText = `${myName} | Soba: ${myRoom}`;

    // --- PEER KONEKCIJA ---
    const peer = new Peer(myPhone, {
        config: {'iceServers': [
            { url: 'stun:stun.l.google.com:19302' },
            { url: 'stun:stun1.l.google.com:19302' }
        ]},
        debug: 3
    });

    socket.emit('join room', { room: myRoom, name: myName, phone: myPhone });

    // PRIHVATANJE POZIVA
    peer.on('call', call => {
        if (confirm("Dolazni poziv! Prihvati?")) {
            navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                myStream = stream;
                document.getElementById('video-wrap').style.display = 'block';
                document.getElementById('local-video').srcObject = stream;
                call.answer(stream);
                currentCall = call;
                call.on('stream', remoteStream => {
                    document.getElementById('remote-video').srcObject = remoteStream;
                });
            }).catch(err => alert("Greška sa kamerom: " + err));
        }
    });

    // POKRETANJE POZIVA
    function makeCall() {
        const target = prompt("Unesi broj osobe koju zoveš:");
        if (target) {
            navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                myStream = stream;
                document.getElementById('video-wrap').style.display = 'block';
                document.getElementById('local-video').srcObject = stream;
                const call = peer.call(target, stream);
                currentCall = call;
                call.on('stream', remoteStream => {
                    document.getElementById('remote-video').srcObject = remoteStream;
                });
            }).catch(err => alert("Morate dopustiti kameru!"));
        }
    }

    function endCall() {
        location.reload(); 
    }

    function resetApp() {
        localStorage.clear();
        location.reload();
    }

    // CHAT
    document.getElementById('chat-form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if (input.value) {
            socket.emit('chat message', { name: myName, text: input.value, phone: myPhone, room: myRoom });
            input.value = '';
        }
    };

    socket.on('chat message', (data) => {
        const li = document.createElement('li');
        if (data.phone === myPhone) li.className = 'my-msg';
        li.innerHTML = `<b style="color:#00a884">${data.name}</b><br>${data.text}`;
        document.getElementById('messages').appendChild(li);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });

    peer.on('error', (err) => {
        console.error("PeerJS Greška: ", err.type);
        if(err.type === 'unavailable-id') alert("Ovaj broj je već zauzet!");
    });
</script>
</body>
</html>
