
<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple Kripto</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0b141a; margin: 0; display: flex; flex-direction: column; height: 100vh; color: white; }
        .header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #313d45; }
        .room-info { font-size: 12px; color: #00a884; }
        #messages { flex: 1; overflow-y: auto; list-style: none; padding: 20px; margin: 0; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        li { padding: 8px 12px; border-radius: 8px; max-width: 70%; background: #202c33; font-size: 15px; align-self: flex-start; border: 1px solid #313d45; }
        .my-msg { align-self: flex-end; background: #005c4b; border: none; }
        .u-name { font-size: 10px; color: #00a884; font-weight: bold; display: block; }
        .crypto-tag { font-size: 9px; color: #8696a0; margin-top: 4px; display: block; }
        form { display: flex; padding: 10px; background: #202c33; }
        input { flex: 1; border: none; padding: 12px; border-radius: 20px; background: #2a3942; color: white; outline: none; }
        #send { background: #00a884; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 style="font-size:18px; margin:0;">Green Apple 🔐</h1>
        <span id="room-display" class="room-info">Soba: -</span>
    </div>
    <button onclick="location.reload()" style="background:none; border:1px solid #555; color:#ccc; border-radius:5px; padding:5px;">Promijeni Sobu</button>
</div>

<ul id="messages"></ul>

<form id="chat-form">
    <input id="msg-input" placeholder="Šifrovana poruka..." autocomplete="off">
    <button id="send">></button>
</form>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    // 1. REGISTRACIJA I SOBE
    let myName = localStorage.getItem('apple_name') || prompt("Tvoje ime:");
    let myPhone = localStorage.getItem('apple_phone') || prompt("Tvoj broj:");
    let myRoom = prompt("Unesi ime privatne sobe (npr. tajna123):") || "javna";
    
    localStorage.setItem('apple_name', myName);
    localStorage.setItem('apple_phone', myPhone);
    
    document.getElementById('room-display').innerText = "Soba: " + myRoom;
    socket.emit('join room', myRoom);

    // 2. JEDNOSTAVNA ENKRIPCIJA (Base64 + Tajni ključ sobe)
    function encrypt(text) {
        return btoa(myRoom + "|" + text); // Šifrira tekst koristeći ime sobe
    }

    function decrypt(encodedText) {
        try {
            let decoded = atob(encodedText);
            let parts = decoded.split("|");
            return (parts[0] === myRoom) ? parts[1] : "Greška u enkripciji";
        } catch(e) { return "Nečitljiva poruka"; }
    }

    // 3. CHAT LOGIKA
    document.getElementById('chat-form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if (input.value) {
            let encryptedMsg = encrypt(input.value);
            socket.emit('chat message', { 
                name: myName, 
                text: encryptedMsg, 
                phone: myPhone, 
                room: myRoom 
            });
            input.value = '';
        }
    };

    socket.on('chat message', (data) => {
        const li = document.createElement('li');
        if (data.phone === myPhone) li.className = 'my-msg';
        
        let plainText = decrypt(data.text);
        li.innerHTML = `<span class="u-name">${data.name}</span>${plainText}<span class="crypto-tag">🔒 End-to-end encrypted</span>`;
        
        document.getElementById('messages').appendChild(li);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });
</script>
</body>
</html>
