
<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple Pro</title>
    <style>
        :root { --green: #30d158; --dark: #000000; --panel: #1c1c1e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--dark); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Login Ekran */
        #gate { position: fixed; inset: 0; background: linear-gradient(180deg, #000, #075e54); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .box { width: 85%; padding: 18px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; color: white; outline: none; }
        .btn { width: 85%; padding: 18px; background: var(--green); color: black; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; }

        /* Header */
        header { padding: 20px; background: var(--panel); border-bottom: 0.5px solid #38383a; display: flex; justify-content: space-between; align-items: center; }
        .dot { width: 12px; height: 12px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); }

        /* User List */
        #user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-card { background: var(--panel); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid transparent; }
        .user-card:active { border-color: var(--green); }

        /* Chat Overlay */
        #chat-view { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; }
        #msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
        .sent { background: var(--green); color: black; align-self: flex-end; border-bottom-right-radius: 4px; }
        .received { background: #2c2c2e; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Footer Input */
        .bar { padding: 15px; background: var(--panel); display: flex; gap: 10px; backdrop-filter: blur(20px); }
        .bar input { flex: 1; padding: 14px; background: #2c2c2e; border: none; border-radius: 25px; color: white; outline: none; }
    </style>
</head>
<body>
    <div id="gate">
        <h1 style="font-size: 48px; letter-spacing: -2px; margin-bottom: 30px;">Green Apple</h1>
        <input type="text" id="u-name" class="box" placeholder="Tvoje Ime">
        <input type="tel" id="u-phone" class="box" placeholder="Broj telefona">
        <button class="btn" onclick="go()">POKRENI KONCERN</button>
    </div>

    <header>
        <h2 style="letter-spacing: -1px;">Razgovori</h2>
        <div class="dot"></div>
    </header>

    <div id="user-list">
        <p style="text-align:center; color:#8e8e93; margin-top:20px;">Traženje korisnika...</p>
    </div>

    <div id="chat-view">
        <header>
            <button onclick="closeChat()" style="background:none; border:none; color:var(--green); font-size:18px;">‹ Nazad</button>
            <b id="chat-target">Ime</b>
            <div style="width: 20px;"></div>
        </header>
        <div id="msgs"></div>
        <div class="bar">
            <input type="text" id="m-input" placeholder="Nova poruka...">
            <button onclick="send()" style="background:var(--green); border:none; width:45px; height:45px; border-radius:50%; font-size:20px;">↑</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = JSON.parse(localStorage.getItem('green_apple_pro'));
        let peer = null;

        if(me) { document.getElementById('gate').style.display = 'none'; socket.emit('register', me); }

        function go() {
            const name = document.getElementById('u-name').value;
            const phone = document.getElementById('u-phone').value;
            if(!name || !phone) return;
            me = { name, phone };
            localStorage.setItem('green_apple_pro', JSON.stringify(me));
            location.reload();
        }

        socket.on('updateUsers', (users) => {
            document.getElementById('user-list').innerHTML = users.filter(u => u.phone !== me.phone).map(u => `
                <div class="user-card" onclick="openChat('${u.phone}', '${u.name}')">
                    <div style="width:55px; height:55px; background:#333; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:20px;">${u.name[0]}</div>
                    <div><b>${u.name}</b><br><small style="color:var(--green)">Online</small></div>
                </div>
            `).join('');
        });

        function openChat(p, n) { peer = p; document.getElementById('chat-target').innerText = n; document.getElementById('chat-view').style.display = 'flex'; }
        function closeChat() { document.getElementById('chat-view').style.display = 'none'; }

        function send() {
            const inp = document.getElementById('m-input');
            if(!inp.value) return;
            socket.emit('sendMessage', { to: peer, text: inp.value });
            render(inp.value, 'sent');
            inp.value = '';
        }

        socket.on('newMessage', (d) => { if(peer === d.from) render(d.text, 'received'); });
        function render(t, s) { const b = document.getElementById('msgs'); b.innerHTML += `<div class="bubble ${s}">${t}</div>`; b.scrollTop = b.scrollHeight; }
    </script>
</body>
</html>
