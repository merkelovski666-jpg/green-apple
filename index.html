<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple Pro</title>
    <style>
        :root { --apple-green: #30d158; --bg: #000; --card: #1c1c1e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; }
        
        /* HEADER SA ANIMACIJOM */
        header { padding: 25px 20px; background: rgba(28,28,30,0.9); backdrop-filter: blur(20px); border-bottom: 0.5px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .pulse { width: 12px; height: 12px; background: var(--apple-green); border-radius: 50%; animation: shadow-pulse 1.5s infinite; }
        @keyframes shadow-pulse { 0% { box-shadow: 0 0 0 0px rgba(48, 209, 88, 0.4); } 100% { box-shadow: 0 0 0 15px rgba(48, 209, 88, 0); } }

        /* LISTA KORISNIKA */
        #user-list { flex: 1; overflow-y: auto; padding: 15px; }
        .empty-state { text-align: center; margin-top: 50px; color: #8e8e93; }
        .user-card { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid transparent; transition: 0.3s; }
        .user-card:active { transform: scale(0.97); background: #2c2c2e; border-color: var(--apple-green); }
        .avatar { width: 55px; height: 55px; background: linear-gradient(135deg, #333, #111); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; color: var(--apple-green); }

        /* MODAL ZA CHAT */
        #chat-window { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
    </style>
</head>
<body>
    <header>
        <h1 style="letter-spacing: -1.5px; font-size: 28px;">Razgovori</h1>
        <div class="pulse"></div>
    </header>

    <div id="user-list">
        <div class="empty-state">
            <p style="font-size: 18px; color: white;">Trenutno nema nikoga online.</p>
            <p style="font-size: 14px; margin-top: 10px;">Pošalji link prijatelju da se povežete u Green Apple!</p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let session = JSON.parse(localStorage.getItem('ga_session'));

        if(!session) {
            let n = prompt("Tvoje Ime:");
            let p = prompt("Tvoj Broj:");
            if(n && p) {
                session = { name: n, phone: p };
                localStorage.setItem('ga_session', JSON.stringify(session));
                location.reload();
            }
        } else {
            socket.emit('register', session);
        }

        socket.on('updateUsers', (users) => {
            const list = document.getElementById('user-list');
            const others = users.filter(u => u.phone !== session.phone);
            
            if(others.length > 0) {
                list.innerHTML = others.map(u => `
                    <div class="user-card" onclick="startChat('${u.phone}', '${u.name}')">
                        <div class="avatar">${u.name[0]}</div>
                        <div>
                            <b style="font-size: 18px;">${u.name}</b><br>
                            <small style="color: var(--apple-green);">Spreman za razgovor</small>
                        </div>
                    </div>
                `).join('');
            }
        });

        function startChat(phone, name) {
            alert("Otvaram čet sa: " + name + "\n(Ovo je Green Apple Pro brzina!)");
        }
    </script>
</body>
</html>
