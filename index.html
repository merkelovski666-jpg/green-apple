<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Apple Pro</title>
    <style>
        :root { --apple-green: #30d158; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .dot { width: 12px; height: 12px; background: var(--apple-green); border-radius: 50%; box-shadow: 0 0 10px var(--apple-green); }
        #list { padding: 10px; }
        .user { background: #1c1c1e; padding: 15px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>Razgovori</h1><div class="dot"></div></header>
    <div id="list"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myInfo = JSON.parse(localStorage.getItem('ga_user'));

        if(!myInfo) {
            const name = prompt("Ime:");
            const phone = prompt("Broj telefona:");
            if(name && phone) {
                myInfo = { name, phone };
                localStorage.setItem('ga_user', JSON.stringify(myInfo));
            }
        }

        socket.emit('register', myInfo);

        socket.on('updateList', (users) => {
            const container = document.getElementById('list');
            container.innerHTML = users
                .filter(u => u.phone !== myInfo.phone)
                .map(u => `<div class="user" onclick="alert('Chat sa ${u.name}')"><b>${u.name}</b><br>${u.phone}</div>`)
                .join('');
            
            if(container.innerHTML === "") {
                container.innerHTML = "<p style='color:gray; text-align:center;'>Trenutno niko drugi nije online. Pošalji link prijatelju!</p>";
            }
        });
    </script>
</body>
</html>
