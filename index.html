<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple</title>
    <style>
        /* DIREKTAN DIZAJN DA NE BUDE SRANJE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #d1d7db; display: flex; justify-content: center; height: 100vh; }
        
        #app {
            width: 100%; max-width: 500px; height: 100%;
            background: #e5ddd5; display: flex; flex-direction: column;
        }

        header {
            background: #075e54; color: white; padding: 15px;
            display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .msg {
            max-width: 80%; padding: 8px 12px; border-radius: 10px;
            font-size: 15px; line-height: 1.4;
        }
        .sent { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
        .received { background: white; align-self: flex-start; border-top-left-radius: 0; }

        footer {
            background: #f0f0f0; padding: 10px; display: flex; gap: 10px;
        }

        input {
            flex: 1; padding: 12px; border: none; border-radius: 20px; outline: none;
        }

        button {
            background: #075e54; color: white; border: none;
            width: 45px; height: 45px; border-radius: 50%; font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <b style="font-size: 18px;">Green Apple</b>
            <span style="font-size: 12px; opacity: 0.8;">Online</span>
        </header>

        <div id="chat-window" id="messages">
            <div class="msg received">Dobrodošli u Green Apple!</div>
        </div>

        <footer>
            <input type="text" id="minput" placeholder="Upiši poruku...">
            <button onclick="sendMsg()">➤</button>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const win = document.getElementById('chat-window');

        function sendMsg() {
            const inp = document.getElementById('minput');
            if(!inp.value) return;
            
            // Prikaz tvoje poruke
            add(inp.value, 'sent');
            socket.emit('send-message', { text: inp.value });
            inp.value = '';
        }

        socket.on('new-message', (data) => {
            add(data.text, 'received');
        });

        function add(text, type) {
            const d = document.createElement('div');
            d.className = 'msg ' + type;
            d.innerText = text;
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
