
<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple</title>
    <style>
        body { font-family: sans-serif; background: #0b141a; margin: 0; display: flex; flex-direction: column; height: 100vh; color: white; }
        .header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        li { padding: 10px; border-radius: 8px; max-width: 80%; background: #202c33; align-self: flex-start; }
        .my-msg { align-self: flex-end; background: #005c4b; }
        form { display: flex; padding: 10px; background: #202c33; border-top: 1px solid #313d45; }
        input { flex: 1; border: none; padding: 12px; border-radius: 20px; background: #2a3942; color: white; outline: none; }
        #send-btn { background: #00a884; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; font-weight: bold; }
        #video-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #local-v { width: 30%; height: 20%; position: absolute; top: 20px; right: 20px; border: 2px solid #00a884; }
        .hangup { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: red; color: white; border: none; border-radius: 50%; width: 60px; height: 60px; font-size: 24px; }
    </style>
</head>
<body>

<div id="video-overlay">
    <video id="remote-v" autoplay playsinline></video>
    <video id="local-v" autoplay muted playsinline></video>
    <button class="hangup" onclick="location.reload()">❌</button>
</div>

<div class="header">
    <h1 style="font-size:18px; margin:0;">Green Apple 🔐</h1>
    <button onclick="startCall()" style="background:#25d366; border:none; color:white; padding:8px 15px; border-radius:20px; font-weight:bold;">📞 POZOVI</button>
</div>

<ul id="messages"></ul>

<form id="chat-form">
    <input id="msg-input" placeholder="Napiši poruku..." autocomplete="off">
    <button id="send-btn" type="submit">></button>
</form>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
    const socket = io();
    
    // Pamćenje podataka
    let myName = localStorage.getItem('apple_name') || prompt("Ime:");
    let myPhone = localStorage.getItem('apple_phone') || prompt("Broj:");
    let myRoom = localStorage.getItem('apple_room') || prompt("Soba:");
    
    if(myName && myPhone && myRoom) {
        localStorage.setItem('apple_name', myName);
        localStorage.setItem('apple_phone', myPhone);
        localStorage.setItem('apple_room', myRoom);
    }

    const peer = new Peer(myPhone, {
        config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
    });

    socket.emit('join', myRoom);

    // SLANJE PORUKE - FIX
    document.getElementById('chat-form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if (input.value) {
            socket.emit('chat message', {
                name: myName,
                text: input.value,
                phone: myPhone,
                room: myRoom
            });
            input.value = '';
        }
    };

    socket.on('chat message', (data) => {
        const li = document.createElement('li');
        if(data.phone === myPhone) li.className = 'my-msg';
        li.innerHTML = `<small style="color:#00a884; display:block;">${data.name}</small>${data.text}`;
        document.getElementById('messages').appendChild(li);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });

    // POZIVI - FIX
    peer.on('call', call => {
        if(confirm("Poziv! Prihvati?")) {
            navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
                document.getElementById('video-overlay').style.display='block';
                document.getElementById('local-v').srcObject=s;
                call.answer(s);
                call.on('stream', rs => document.getElementById('remote-v').srcObject=rs);
            });
        }
    });

    function startCall() {
        const target = prompt("Koga zoveš (broj):");
        if(target) {
            navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
                document.getElementById('video-overlay').style.display='block';
                document.getElementById('local-v').srcObject=s;
                const call = peer.call(target, s);
                call.on('stream', rs => document.getElementById('remote-v').srcObject=rs);
            });
        }
    }
</script>
</body>
</html>
