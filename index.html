
<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple Pro</title>
    <style>
        :root { --apple-green: #32d74b; --dark-bg: #000; --panel-bg: #1c1c1e; }
        body { font-family: -apple-system, sans-serif; background: var(--dark-bg); margin: 0; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .header { background: rgba(28,28,30,0.9); backdrop-filter: blur(15px); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #333; z-index: 100; }
        .user-meta { display: flex; align-items: center; gap: 10px; }
        #p-img-head { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #333; }
        
        /* Menu */
        .menu-dots { font-size: 24px; cursor: pointer; padding: 5px; color: var(--apple-green); }
        #settings-panel { display: none; position: fixed; top: 60px; right: 10px; background: var(--panel-bg); border-radius: 12px; width: 250px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 200; border: 0.5px solid #444; }
        
        /* Chat */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 14px; border-radius: 18px; max-width: 75%; font-size: 15px; position: relative; list-style: none; }
        .me { align-self: flex-end; background: var(--apple-green); color: black; border-bottom-right-radius: 4px; }
        .them { align-self: flex-start; background: var(--panel-bg); color: white; border-bottom-left-radius: 4px; }
        
        /* Video Overlay */
        #video-wrap { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 3000; }
        #remote-v { width: 100%; height: 100%; object-fit: cover; }
        #local-v { width: 100px; height: 150px; position: absolute; top: 30px; right: 20px; border-radius: 12px; border: 2px solid var(--apple-green); object-fit: cover; }
        .hangup { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: #ff3b30; width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 30px; color: white; }

        /* Input */
        .input-bar { background: var(--panel-bg); padding: 10px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: #2c2c2e; border: none; padding: 12px 15px; border-radius: 20px; color: white; outline: none; }
        .btn-send { background: var(--apple-green); border: none; width: 35px; height: 35px; border-radius: 50%; color: black; font-weight: bold; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="video-wrap">
    <video id="remote-v" autoplay playsinline></video>
    <video id="local-v" autoplay muted playsinline></video>
    <button class="hangup" onclick="location.reload()">✕</button>
</div>

<div class="header">
    <div class="user-meta">
        <img id="p-img-head" src="https://www.w3schools.com/howto/img_avatar.png">
        <div>
            <div id="display-name" style="font-weight: bold; font-size: 14px;">Preet Nemo</div>
            <div id="typing-status" style="font-size: 10px; color: var(--apple-green); height: 12px;"></div>
        </div>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <span onclick="startCall()" style="font-size: 20px; cursor: pointer;">📞</span>
        <span class="menu-dots" onclick="toggleSettings()">⋮</span>
    </div>
</div>

<div id="settings-panel">
    <h3 style="margin-top: 0; font-size: 16px;">Postavke Profila</h3>
    <label style="font-size: 12px;">Profilna Slika:</label>
    <input type="file" id="img-upload" accept="image/*" style="font-size: 10px; margin: 10px 0;">
    <label style="font-size: 12px;">Ime:</label>
    <input type="text" id="set-name" style="width: 90%; margin-bottom: 10px;">
    <button onclick="saveSettings()" style="width: 100%; background: var(--apple-green); border: none; padding: 8px; border-radius: 8px; font-weight: bold;">Spasi Izmjene</button>
</div>

<ul id="messages"></ul>

<form class="input-bar" id="chat-form">
    <input id="msg-input" placeholder="iMessage" autocomplete="off">
    <button type="submit" class="btn-send">↑</button>
</form>

<audio id="call-snd" src="https://assets.mixkit.co/active_storage/sfx/1350/1350-preview.mp3" loop></audio>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
    const socket = io();
    const myNum = "00387603344334";
    let myName = localStorage.getItem('apple_name') || "Preet Nemo";
    let myImg = localStorage.getItem('apple_img') || "https://www.w3schools.com/howto/img_avatar.png";
    let myRoom = "apple_private_room";

    // Inicijalizacija profila
    document.getElementById('p-img-head').src = myImg;
    document.getElementById('display-name').innerText = myName;
    document.getElementById('set-name').value = myName;

    const peer = new Peer(myNum, {
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }]}
    });

    socket.emit('join', myRoom);

    // POSTAVKE
    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        const newName = document.getElementById('set-name').value;
        const file = document.getElementById('img-upload').files[0];

        if(newName) {
            myName = newName;
            localStorage.setItem('apple_name', newName);
            document.getElementById('display-name').innerText = newName;
        }

        if(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                myImg = e.target.result;
                localStorage.setItem('apple_img', myImg);
                document.getElementById('p-img-head').src = myImg;
            };
            reader.readAsDataURL(file);
        }
        toggleSettings();
    }

    // CHAT I TYPING
    const input = document.getElementById('msg-input');
    input.addEventListener('input', () => socket.emit('typing', { room: myRoom, name: myName }));

    document.getElementById('chat-form').onsubmit = (e) => {
        e.preventDefault();
        if (input.value) {
            socket.emit('chat message', { name: myName, text: input.value, phone: myNum, room: myRoom, img: myImg });
            input.value = '';
        }
    };

    socket.on('chat message', (data) => {
        const li = document.createElement('li');
        li.className = `msg ${data.phone === myNum ? 'me' : 'them'}`;
        li.innerHTML = `<small style="font-size:9px; opacity:0.7; display:block;">${data.name}</small>${data.text}`;
        document.getElementById('messages').appendChild(li);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });

    socket.on('typing', (data) => {
        const status = document.getElementById('typing-status');
        status.innerText = `${data.name} tipka...`;
        setTimeout(() => status.innerText = "", 3000);
    });

    // POZIVI - POPRAVLJENA LOGIKA
    peer.on('call', call => {
        document.getElementById('call-snd').play();
        if(confirm("Dolazni Apple Video Poziv...")) {
            document.getElementById('call-snd').pause();
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                document.getElementById('video-wrap').style.display = 'block';
                document.getElementById('local-v').srcObject = stream;
                call.answer(stream);
                call.on('stream', rs => document.getElementById('remote-v').srcObject = rs);
            });
        }
    });

    function startCall() {
        const target = prompt("Broj telefona osobe:");
        if(target) {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                document.getElementById('video-wrap').style.display = 'block';
                document.getElementById('local-v').srcObject = stream;
                const call = peer.call(target, stream);
                call.on('stream', rs => document.getElementById('remote-v').srcObject = rs);
            }).catch(() => alert("Kamera nije dostupna!"));
        }
    }
</script>
</body>
</html>
