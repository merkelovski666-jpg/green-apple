<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Apple</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Green Apple Chat</h1>
        <div id="chat-box"></div>
        <input type="text" id="message" placeholder="Upiši poruku...">
        <button onclick="sendMessage()">Pošalji</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Ovde ide tvoja klijentska logika za poruke i pozive
        function sendMessage() {
            const text = document.getElementById('message').value;
            socket.emit('send-message', { from: 'Ja', to: 'Prijatelj', text: text });
        }

        socket.on('new-message', (data) => {
            alert(data.from + ": " + data.text);
        });
    </script>
</body>
</html>
