<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple Central</title>
    <style>
        :root { --apple-green: #32d74b; --bg: #000; --panel: #1c1c1e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; color: white; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: rgba(20,20,20,0.95); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #222; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .p-img { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #333; }
        
        /* Admin Panel */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; padding: 20px; box-sizing: border-box; }
        .user-card { background: var(--panel); padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-close { background: var(--apple-green); border: none; padding: 10px; border-radius: 5px; width: 100%; margin-top: 20px; font-weight: bold; }

        /* Chat UI */
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 15px; border-radius: 20px; max-width: 75%; font-size: 15px; line-height: 1.4; list-style: none; }
        .me { align-self: flex-end; background: var(--apple-green); color: black; border-bottom-right-radius: 4px; }
        .them { align-self: flex-start; background: var(--panel); color: white; border-bottom-left-radius: 4px; }

        /* Input */
        .input-area { background: var(--bg); padding: 15px; display: flex; gap: 10px; border-top: 0.5px solid #222; }
        input { flex: 1; background: #262629; border: 0.5px solid #333; padding: 12px; border-radius: 25px; color: white; outline: none; }
        .send { background: var(--apple-green); border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="admin-panel">
    <h2 style="color: var(--apple-green);">Admin Dashboard 🍏</h2>
    <p>Lista aktivnih korisnika:</p>
    <div id="user-list"></div>
    <button class="btn-close" onclick="toggleAdmin()">ZATVORI PANEL</button>
</div>

<div class="header">
    <div class="user-info">
        <img class="p-img" src="https://img.icons8.com/color/96/000000/apple.png">
        <div>
            <b style="font-size: 16px;">Green Apple Support</b><br>
            <span id="online-count" style="font-size: 10px; color: var(--apple-green);">Povezivanje...</span>
        </div>
    </div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <span onclick="toggleAdmin()" style="cursor: pointer; font-size: 20px;">⚙️</span>
        <span style="color: var(--apple-green); font-size: 24px; cursor: pointer;">⋮</span>
    </div>
</div>

<ul id="chat"></ul>

<form class="input-area" id="f">
    <input id="m" placeholder="iMessage" autocomplete="off">
    <button class="send" type="submit">↑</button>
</form>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const myPhone = "00387603344334";
    const myName = "Preet Nemo (Admin)";
    
    socket.emit('join', { room: 'central', name: myName, phone: myPhone });

    // Chat
    document.getElementById('f').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('m');
        if(input.value) {
            socket.emit('chat message', { name: myName, text: input.value, phone: myPhone, room: 'central' });
            input.value = '';
        }
    };

    socket.on('chat message', (data) => {
        const li = document.createElement('li');
        li.className = `msg ${data.phone === myPhone ? 'me' : 'them'}`;
        li.innerHTML = `<small style="display:block; font-size:9px; opacity:0.6">${data.name}</small>${data.text}`;
        document.getElementById('chat').appendChild(li);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    });

    // ADMIN LOGIKA I USER LISTA
    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    socket.on('update users', (users) => {
        document.getElementById('online-count').innerText = `${users.length} korisnika online`;
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        users.forEach(u => {
            const card = document.createElement('div');
            card.className = 'user-card';
            card.innerHTML = `
                <div><b>${u.name}</b><br><small>${u.phone}</small></div>
                <button onclick="alert('Pozivanje ${u.phone}...')" style="background:var(--apple-green); border:none; border-radius:5px; padding:5px 10px;">NAZOVI</button>
            `;
            list.appendChild(card);
        });
    });
</script>
</body>
</html>
