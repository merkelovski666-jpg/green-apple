<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Green Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="apple-container">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple Logo" class="logo">
            <h1>Green Chat</h1>
        </div>
        <div id="chat-box" class="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Napiši poruku...">
            <button onclick="sendMessage()">Pošalji</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
