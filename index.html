<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple - Next Gen</title>
    <style>
        :root { --apple-green: #30d158; --bg: #000000; --glass: rgba(28, 28, 30, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* Login */
        #gate { position: fixed; inset: 0; background: linear-gradient(135deg, #000, #053a34); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { width: 85%; padding: 18px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; color: white; font-size: 16px; outline: none; }
        .btn { width: 85%; padding: 18px; background: var(--apple-green); color: black; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; }

        /* UI */
        .shell { display: none; height: 100vh; flex-direction: column; }
        header { padding: 20px; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 0.5px solid #38383a; display: flex; justify-content: space-between; align-items: center; }
        #user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-row { background: var(--glass); margin-bottom: 10px; padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; }

        /* Chat */
        #chat-view { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; }
        #msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 18px; font-size: 16px; }
        .sent { background: var(--apple-green); color: black; align-self: flex-end; }
        .received { background: #1c1c1e; color: white; align-self: flex-start; }
        .bar { padding: 15px; background: var(--glass); display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div id="gate">
        <h1 style="font-size: 42px; margin-bottom: 30px;">Green Apple</h1>
        <input type="text" id="u-name" placeholder="Ime">
        <input type="tel" id="u-phone" placeholder="Broj telefona">
        <button class="btn" onclick="start()">POKRENI KONCERN</button>
    </div>

    <div class="shell" id="app">
        <header><h2>Razgovori</h2><div style="width:12px; height:12px; background:var(--apple-green); border-radius:50%;"></div></header>
        <div id="user-list"></div>
    </div>

    <div id="chat-view">
        <header><button onclick="closeChat()" style="background:none; border:none; color:var(--apple-green); font-size:18px;">‹ Nazad</button><b id="chat-title"></b><div></div></header>
        <div id="msgs"></div>
        <div class="bar">
            <input type="text" id="m-input" placeholder="Poruka..." style="margin:0;">
            <button onclick="fire()" style="background:var(--apple-green); border:none; width:50px; border-radius:50%; font-size:20px;">↑</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = JSON.parse(localStorage.getItem('apple_v3'));
        let peer = null;

        if(me) { document.getElementById('gate').style.display = 'none'; document.getElementById('app').style.display = 'flex'; socket.emit('auth', me); }

        function start() {
            const name = document.getElementById('u-name').value;
            const phone = document.getElementById('u-phone').value;
            if(!name || !phone) return;
            me = { name, phone };
            localStorage.setItem('apple_v3', JSON.stringify(me));
            location.reload();
        }

        socket.on('sync-users', (users) => {
            document.getElementById('user-list').innerHTML = users.filter(u => u.phone !== me.phone).map(u => `
                <div class="user-row" onclick="openChat('${u.phone}', '${u.name}')">
                    <div style="width:50px; height:50px; background:#333; border-radius:50%; display:flex; align-items:center; justify-content:center;">${u.name[0]}</div>
                    <div><b>${u.name}</b><br><small style="color:var(--apple-green)">Online</small></div>
                </div>
            `).join('');
        });

        function openChat(p, n) { peer = p; document.getElementById('chat-title').innerText = n; document.getElementById('chat-view').style.display = 'flex'; }
        function closeChat() { document.getElementById('chat-view').style.display = 'none'; }
        function fire() {
            const i = document.getElementById('m-input');
            if(!i.value) return;
            socket.emit('msg-send', { to: peer, text: i.value });
            render(i.value, 'sent');
            i.value = '';
        }
        socket.on('msg-receive', (d) => { if(peer === d.from) render(d.text, 'received'); });
        function render(t, s) { 
            const b = document.getElementById('msgs');
            b.innerHTML += `<div class="bubble ${s}">${t}</div>`;
            b.scrollTop = b.scrollHeight;
        }
    </script>
</body>
</html>
