<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Apple - Koncern</title>
    <style>
        :root { --green: #30d158; --dark: #000; --card: #1c1c1e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--dark); color: white; height: 100vh; overflow: hidden; }

        /* Login gate */
        #gate { position: fixed; inset: 0; background: linear-gradient(180deg, #000, #0a3d2e); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .box { width: 85%; padding: 15px; margin: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; outline: none; }
        .btn { width: 85%; padding: 18px; background: var(--green); color: black; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* App UI */
        #app { display: none; height: 100vh; flex-direction: column; }
        header { padding: 20px; background: rgba(28,28,30,0.8); backdrop-filter: blur(10px); border-bottom: 0.5px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .active-dot { width: 12px; height: 12px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); }
        #user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }

        /* Chat Overlay */
        #chat { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; }
        #msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 18px; font-size: 16px; position: relative; }
        .sent { background: var(--green); color: black; align-self: flex-end; }
        .received { background: #2c2c2e; color: white; align-self: flex-start; }
        .bar { padding: 15px; background: #1c1c1e; display: flex; gap: 10px; }
        .bar input { flex: 1; padding: 12px; background: #2c2c2e; border: none; border-radius: 20px; color: white; outline: none; }
    </style>
</head>
<body>
    <div id="gate">
        <h1 style="font-size: 50px; letter-spacing: -2px; margin-bottom: 40px;">Green Apple</h1>
        <input type="text" id="u-name" class="box" placeholder="Tvoje Ime">
        <input type="tel" id="u-phone" class="box" placeholder="Broj telefona">
        <button class="btn" onclick="startApp()">POKRENI SISTEM</button>
    </div>

    <div id="app">
        <header>
            <h2 style="font-size: 24px;">Razgovori</h2>
            <div class="active-dot"></div>
        </header>
        <div id="user-list"></div>
    </div>

    <div id="chat">
        <header>
            <button onclick="closeChat()" style="background:none; border:none; color:var(--green); font-size:18px;">‹ Nazad</button>
            <b id="chat-with">Osoba</b>
            <div style="width: 20px;"></div>
        </header>
        <div id="msgs"></div>
        <div class="bar">
            <input type="text" id="m-input" placeholder="Nova poruka...">
            <button onclick="sendMsg()" style="background:var(--green); border:none; width:40px; height:40px; border-radius:50%; font-size:20px;">↑</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = JSON.parse(localStorage.getItem('apple_user_pro'));
        let targetPhone = null;

        if(me) { 
            document.getElementById('gate').style.display = 'none'; 
            document.getElementById('app').style.display = 'flex';
            socket.emit('register', me); 
        }

        function startApp() {
            const name = document.getElementById('u-name').value;
            const phone = document.getElementById('u-phone').value;
            if(!name || !phone) return alert("Popuni sve!");
            me = { name, phone };
            localStorage.setItem('apple_user_pro', JSON.stringify(me));
            location.reload();
        }

        socket.on('updateUsers', (users) => {
            document.getElementById('user-list').innerHTML = users.filter(u => u.phone !== me.phone).map(u => `
                <div class="user-card" onclick="openChat('${u.phone}', '${u.name}')">
                    <div style="width:50px; height:50px; background:#444; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${u.name[0]}</div>
                    <div><b>${u.name}</b><br><small style="color:var(--green)">Online</small></div>
                </div>
            `).join('');
        });

        function openChat(p, n) { 
            targetPhone = p; 
            document.getElementById('chat-with').innerText = n; 
            document.getElementById('chat').style.display = 'flex'; 
        }
        function closeChat() { document.getElementById('chat').style.display = 'none'; }

        function sendMsg() {
            const inp = document.getElementById('m-input');
            if(!inp.value) return;
            socket.emit('sendMessage', { to: targetPhone, text: inp.value });
            renderMsg(inp.value, 'sent');
            inp.value = '';
        }

        socket.on('newMessage', (d) => { if(targetPhone === d.from) renderMsg(d.text, 'received'); });
        function renderMsg(t, s) { 
            const m = document.getElementById('msgs');
            m.innerHTML += `<div class="bubble ${s}">${t}</div>`;
            m.scrollTop = m.scrollHeight;
        }
    </script>
</body>
</html>
